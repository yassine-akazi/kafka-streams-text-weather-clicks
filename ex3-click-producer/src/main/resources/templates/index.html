<!doctype html><html lang="fr"><head><meta charset="UTF-8"><title>TP5 Click Producer</title><style>body{font-family:Arial;background:#f5f7fb;text-align:center;padding-top:80px}button{font-size:24px;padding:20px 40px;border:0;border-radius:12px;background:#0f172a;color:white;cursor:pointer}.box{background:white;padding:40px;border-radius:18px;display:inline-block;box-shadow:0 10px 25px #ddd}</style></head><body><div class="box"><h1>Comptage de clics Kafka</h1><input id="user" value="user1"><br><br><button onclick="sendClick()">Cliquez ici</button><p id="msg"></p></div><script>async function sendClick(){const u=document.getElementById('user').value;await fetch('/click?userId='+encodeURIComponent(u),{method:'POST'});document.getElementById('msg').innerText='Clic envoyé vers Kafka pour '+u;}</script></body></html>
